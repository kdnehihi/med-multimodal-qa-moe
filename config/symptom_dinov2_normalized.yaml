seed: 42

data:
  train_path: data/processed/healmqa_1500_normalized.jsonl
  val_ratio: 0.1
  raw_dir: data/raw
  processed_dir: data/processed
  image_size: 224

model:
  vision_model_name: facebook/dinov2-base
  second_vision_model_name:
  use_soft_router: false
  text_model_name: google/flan-t5-base
  freeze_vision: true
  freeze_text_encoder: true

training:
  batch_size: 2
  eval_batch_size: 2
  gradient_accumulation_steps: 4
  epochs: 3
  max_train_steps: 1000
  eval_steps: 50
  log_steps: 10
  learning_rate: 1.0e-4
  weight_decay: 0.01
  max_question_length: 96
  max_answer_length: 64
  gradient_checkpointing: true
  num_workers: 0
  device: mps
  output_dir: outputs/checkpoints/symptom_dinov2_flan_t5_base_normalized
