seed: 42

data:
  train_path: data/processed/train.jsonl
  val_path: data/processed/val.jsonl
  raw_dir: data/raw
  processed_dir: data/processed
  image_size: 224
  vqa_rad:
    dataset_name: flaviagiammarino/vqa-rad
    splits: train
    output_path: data/processed/vqa_rad_500.jsonl
    image_output_dir: data/processed/vqa_rad_500_images
    sample_size: 500
  healmqa:
    annotations_path: data/raw/share healmqa/HealMQA_500.json
    image_dir: data/raw/share healmqa/images_500
    output_path: data/processed/healmqa_500.jsonl
    image_output_dir: data/processed/healmqa_500_images
  medquad:
    dataset_name: Tonic/medquad
    output_path: data/processed/medquad_500.jsonl
    sample_size: 500

model:
  hidden_dim: 256
  instruction_dim: 384
  adapter_dim: 64
  vision_encoder_name: clip-vit-base-patch32
  language_model_name: t5-small

training:
  batch_size: 4
  epochs: 5
  learning_rate: 0.0001
  device: cuda
