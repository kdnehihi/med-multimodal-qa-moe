seed: 42

data:
  train_path: data/processed/train_merged.jsonl
  val_ratio: 0.1
  raw_dir: data/raw
  processed_dir: data/processed
  image_size: 224
  vqa_rad:
    dataset_name: flaviagiammarino/vqa-rad
    splits: train
    output_path: data/processed/vqa_rad_1500.jsonl
    image_output_dir: data/processed/vqa_rad_1500_images
    sample_size: 1500
  healmqa:
    annotations_path: data/raw/share healmqa/HealMQA_500.json
    image_dir: data/raw/share healmqa/images_500
    output_path: data/processed/healmqa_500.jsonl
    image_output_dir: data/processed/healmqa_500_images
    augmented_output_path: data/processed/healmqa_1500.jsonl
  medquad:
    dataset_name: Tonic/medquad
    output_path: data/processed/medquad_2000.jsonl
    sample_size: 2000

model:
  vision_model_name: microsoft/BiomedCLIP-PubMedBERT_256-vit_base_patch16_224
  second_vision_model_name: facebook/dinov2-base
  text_model_name: google/flan-t5-base
  freeze_vision: true
  freeze_text_encoder: true

training:
  batch_size: 2
  eval_batch_size: 2
  gradient_accumulation_steps: 4
  epochs: 5
  max_train_steps: 2000
  eval_steps: 50
  log_steps: 10
  learning_rate: 1.0e-4
  weight_decay: 0.01
  max_question_length: 96
  max_answer_length: 64
  gradient_checkpointing: true
  num_workers: 0
  device: mps
  output_dir: outputs/checkpoints/query_router_biomedclip_dinov2_flan_t5_base
